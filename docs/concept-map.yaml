  # ─── Walrus Sites ─────────────────────────────────────────────────────────

  walrus-sites:
    must_appear_in:
      - "sites/overview.mdx"
    terms:
      - "Walrus Sites"
      - "site-builder"
      - "deploy"
      - "portal"
      - "decentralized"

  site-builder:
    must_appear_in:
