# This is a procman v0.15.1 script. Install procman with
# cargo install procman.
#
# Read the procman book at https://wbbradley.github.io/procman
#
# Run `procman procman.yaml -- --help` for instructions on using this script.
#

config:
  logs: ./working_dir/logs
  args:
    working_dir:
      short: w
      description: "The working directory for the testbed"
      default: ./working_dir
    existing:
      short: e
      type: bool
      description: "Skip build and deploy, use existing config"
      default: "false"
      env: WALRUS_EXISTING
    gc:
      short: g
      type: bool
      description: "Enable garbage collection config patching"
      default: "false"
      env: WALRUS_GC
    aggregator:
      short: A
      type: bool
      description: "Start an aggregator daemon"
      default: "false"
      env: WALRUS_AGGREGATOR
    rust-log:
      short: l
      type: string
      description: "RUST_LOG level for nodes and aggregator"
      default: "info"
      env: WALRUS_RUST_LOG
    contract-dir:
      type: string
      description: "Contract directory (use ./testnet-contracts for testnet)"
      default: "./contracts"
      env: WALRUS_CONTRACT_DIR

jobs:
  sui:
    env:
      RUST_LOG: "on,error"
    depends:
      - not_listening: 127.0.0.1:9123
    run: sui start --with-faucet --force-regenesis

  build:
    once: true
    condition: test "$WALRUS_EXISTING" != "true"
    run: |
      cargo build --release \
        --bin walrus \
        --bin walrus-node \
        --bin walrus-deploy \
        --bin walrus-backup \
        --features deploy,backup

  deploy:
    once: true
    condition: test "$WALRUS_EXISTING" != "true"
    depends:
      - url: http://localhost:9123/
        code: 200
      - process_exited:
          name: build
          timeout_seconds: null
    run: |
      COMMITTEE_SIZE="${WALRUS_COMMITTEE_SIZE:-4}"
      SHARDS="${WALRUS_SHARDS:-10}"

      if ! [ "$COMMITTEE_SIZE" -gt 0 ] 2>/dev/null; then
        echo "Invalid: COMMITTEE_SIZE=$COMMITTEE_SIZE is not a valid positive integer."
        exit 1
      fi
      if ! [ "$SHARDS" -ge "$COMMITTEE_SIZE" ] 2>/dev/null; then
        echo "Invalid: SHARDS=$SHARDS must be >= COMMITTEE_SIZE=$COMMITTEE_SIZE."
        exit 1
      fi

      EPOCH_DURATION="${WALRUS_EPOCH_DURATION:-1h}"
      NETWORK="${WALRUS_NETWORK:-localnet}"
      HOST_ADDRESS="${WALRUS_HOST_ADDRESS:-127.0.0.1}"

      # Clean old build artifacts and configs
      find contracts -name 'build' -type d -exec rm -rf {} +
      rm -f "${{ args.working_dir}}"/dryrun-node-*.yaml
      rm -f "${{ args.working_dir}}"/dryrun-node-*.log

      # Build host address list
      HOSTS=()
      for i in $(seq 1 "$COMMITTEE_SIZE"); do
        HOSTS+=("$HOST_ADDRESS")
      done

      # Deploy system contract
      ./target/release/walrus-deploy deploy-system-contract \
        --working-dir "${{ args.working_dir}}" \
        --sui-network "$NETWORK" \
        --n-shards "$SHARDS" \
        --host-addresses "${HOSTS[@]}" \
        --storage-price 5 \
        --write-price 1 \
        --epoch-duration "$EPOCH_DURATION" \
        --contract-dir "$WALRUS_CONTRACT_DIR" \
        --with-wal-exchange

      # Generate per-node configs
      ./target/release/walrus-deploy generate-dry-run-configs \
        --working-dir "${{ args.working_dir}}"

      # Append event processor config to all node configs
      for f in "${{ args.working_dir}}"/dryrun-node-*[0-9].yaml; do
        cat >> "$f" <<'NODEEOF'

      event_processor_config:
        adaptive_downloader_config:
          max_workers: 2
          initial_workers: 2
      NODEEOF
      done

      # Append garbage collection config if enabled
      if [ "$WALRUS_GC" = "true" ]; then
        for f in "${{ args.working_dir}}"/dryrun-node-*[0-9].yaml; do
          cat >> "$f" <<'GCEOF'

      db_config:
        global:
          experimental_use_optimistic_transaction_db: true
      garbage_collection:
        enable_blob_info_cleanup: true
        enable_data_deletion: true
      GCEOF
        done
      fi

  nodes:
    depends:
      - process_exited:
          name: deploy
          timeout_seconds: null
    for_each:
      glob: "${{ args.working_dir }}/dryrun-node-*[0-9].yaml"
      as: NODE_CONFIG
    env:
      RUST_LOG: "${{ args.rust-log }}"
    run: |
      CLEANUP_FLAG=""
      if [ "$WALRUS_EXISTING" != "true" ]; then
        CLEANUP_FLAG="--cleanup-storage"
      fi
      ./target/release/walrus-node run --config-path $NODE_CONFIG $CLEANUP_FLAG

  aggregator:
    condition: test "$WALRUS_AGGREGATOR" = "true"
    depends:
      - process_exited:
          name: deploy
          timeout_seconds: null
    env:
      RUST_LOG: "${{ args.rust-log }}"
    run: |
      ./target/release/walrus aggregator \
        --config "${{ args.working_dir }}/client_config.yaml" \
        --bind-address 127.0.0.1:31415 \
        --metrics-address 127.0.0.1:27182
