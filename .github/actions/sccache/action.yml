name: Set up sccache
description: Configure GCP credentials and sccache for Rust builds (skipped for dependabot)

inputs:
  gcp_credentials_json:
    description: GCP service account credentials JSON
    required: true

runs:
  using: "composite"
  steps:
    - name: Configure GCP credentials
      if: ${{ github.actor != 'dependabot[bot]' }}
      uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # pin@v3.0.0
      with:
        credentials_json: ${{ inputs.gcp_credentials_json }}
    - name: Set up sccache
      if: ${{ github.actor != 'dependabot[bot]' }}
      uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # pin@v0.0.9
