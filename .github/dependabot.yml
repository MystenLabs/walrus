# Documentation for all configuration options:
# https://docs.github.com/en/code-security/reference/supply-chain-security/dependabot-options-reference

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
    commit-message:
      prefix: "fix"
      prefix-development: "chore"
      include: "scope"
    groups:
      cargo-minor-and-patch-dependencies:
        update-types:
          - "minor"
          - "patch"
      opentelemetry:
        patterns:
          - "opentelemetry"
          - "opentelemetry-*"
          - "tracing-opentelemetry"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: futures-timer
      - dependency-name: move-*
      - dependency-name: mysten-metrics
      - dependency-name: protobuf # TODO: remove after fixing WAL-458
      - dependency-name: sui
      - dependency-name: sui-*
      - dependency-name: telemetry-subscribers
      - dependency-name: test-cluster
      - dependency-name: tokio
      - dependency-name: typed-store
      - dependency-name: tokio-stream # cannot always update to latest version due to simtest
      - dependency-name: tokio-util # cannot always update to latest version due to simtest

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions-all:
        patterns: ["*"]
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "slackapi/slack-github-action" # TODO(WAL-1119): remove after bump to v2

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
    groups:
      pre-commit-all:
        patterns: ["*"]
