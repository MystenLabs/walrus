name: Attach Walrus binaries to a release
run-name: Attach Walrus binaries to a ${{ github.event.inputs.walrus_tag || github.ref_name }} release

on:
  release:
    types: created
  workflow_dispatch:
    inputs:
      walrus_tag:
        description: "Walrus repo tag to attach builds to"
        type: string
        required: true

concurrency: ${{ github.workflow }}-${{ inputs.walrus_tag || github.ref }}

env:
  TAG_NAME: "${{ github.event.inputs.walrus_tag || github.ref_name }}"
  BINARY_LIST_FILE: "./binary-build-list.json"
  CARGO_TERM_COLOR: always
  # Disable incremental compilation.
  #
  # Incremental compilation is useful as part of an edit-build-test-edit cycle,
  # as it lets the compiler avoid recompiling code that hasn't changed. However,
  # on CI, we're not making small edits; we're almost always building the entire
  # project from scratch. Thus, incremental compilation on CI actually
  # introduces *additional* overhead to support making future builds
  # faster...but no future builds will ever occur in any given CI environment.
  #
  # See https://matklad.github.io/2021/09/04/fast-rust-builds.html#ci-workflow
  # for details.
  CARGO_INCREMENTAL: 0
  # Allow more retries for network requests in cargo (downloading crates) and
  # rustup (installing toolchains). This should help to reduce flaky CI failures
  # from transient network timeouts or other issues.
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  # Don't emit giant backtraces in the CI logs.
  RUST_BACKTRACE: short
  TMP_BUILD_DIR: "./tmp/release"

jobs:
  release-build:
    name: Build & Publish Binaries
    timeout-minutes: 120
    strategy:
      matrix:
        include:
          - os: ubuntu-ghcloud
            os_type: ubuntu-x86_64
            runner_arch: x86_64
            linux_prebuilt_path: walrus
            extention: ""
          - os: ubuntu-arm64
            os_type: ubuntu-aarch64
            runner_arch: aarch64
            linux_prebuilt_path: walrus-arm64
            extention: ""
          - os: windows-ghcloud
            os_type: windows-x86_64
            runner_arch: x86_64
            linux_prebuilt_path: ""
            extention: ".exe"
          - os: macos-latest-large
            os_type: macos-x86_64
            runner_arch: x86_64
            linux_prebuilt_path: ""
            extention: ""
          - os: macos-latest-xlarge
            os_type: macos-arm64
            runner_arch: arm64
            linux_prebuilt_path: ""
            extention: ""
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GCS_BUCKET: walrus-sccache
      SCCACHE_GCS_KEY_PREFIX: ${{ matrix.os }}
      SCCACHE_GCS_RW_MODE: READ_ONLY
      RUSTC_WRAPPER: sccache
      extention: ${{ matrix.extention }}
      linux_prebuilt_path: ${{ matrix.linux_prebuilt_path }}
      os_type: ${{ matrix.os_type }}
    steps:
      - name: Clean up and validate tag name
        shell: bash
        run: |
          export walrus_tag=$(echo ${{ env.TAG_NAME }} | sed s/'refs\/tags\/'//)
          [[ "${walrus_tag}" == "main" ]] && echo "tag cannot be equals to 'main'" && exit 1
          echo "walrus_tag=${walrus_tag}" >> $GITHUB_ENV
          export walrus_version=$(echo ${walrus_tag} | sed -e 's/mainnet-v//' -e 's/testnet-v//' -e 's/devnet-v//')
          echo "walrus_version=${walrus_version}" >> $GITHUB_ENV

      - name: Check out ${{ env.walrus_tag }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v7.0.0
        with:
          ref: ${{ env.walrus_tag }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # pin@v3.0.1
        with:
          version: ">= 363.0.0"

      - name: Configure GCP service user auth
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # pin@v3.0.0
        with:
          credentials_json: ${{ secrets.GCP_WALRUS_RELEASE_BUCKET_SVCUSER_CREDENTIALS }}

      - name: Validate runner architecture
        shell: bash
        run: |
          actual_arch=$(uname -m)
          expected_arch="${{ matrix.runner_arch }}"
          case "${expected_arch}" in
            aarch64|arm64) allowed_arches="aarch64 arm64" ;;
            x86_64)        allowed_arches="x86_64" ;;
            *)
              echo "::error::Unsupported expected runner architecture: ${expected_arch}"
              exit 1
              ;;
          esac

          if [[ " ${allowed_arches} " != *" ${actual_arch} "* ]]; then
            echo "::error::Runner ${{ matrix.os }} reported architecture ${actual_arch}, expected one of: ${allowed_arches}"
            exit 1
          fi

      - name: Check if tar balls have been uploaded already
        continue-on-error: true
        shell: bash
        run: |
          gcp_existing_archive=""
          for network in mainnet testnet devnet; do
            name="walrus-${network}-v${{ env.walrus_version }}-${{ env.os_type }}.tgz"
            if gcloud storage ls "gs://mysten-walrus-binaries/${name}" >/dev/null 2>&1; then
              gcp_existing_archive="$name"
              break
            fi
          done
          echo "gcp_existing_archive=$gcp_existing_archive" >> "$GITHUB_ENV"

      - name: Download archive, if it exists
        if: ${{ env.gcp_existing_archive != '' }}
        shell: bash
        run: |
          mkdir -p ${{ env.TMP_BUILD_DIR }}
          gcloud storage cp gs://mysten-walrus-binaries/${{ env.gcp_existing_archive }} ./tmp/walrus-${{ env.walrus_tag }}-${os_type}.tgz
          tar -xf ./tmp/walrus-${{ env.walrus_tag }}-${os_type}.tgz -C ${{ env.TMP_BUILD_DIR }}

      - name: Resolve walrus_sha for prebuilt binary lookup (Linux)
        if: ${{ startsWith(matrix.os, 'ubuntu') && env.gcp_existing_archive == '' }}
        shell: bash
        run: |
          echo "walrus_sha=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Download prebuilt binaries from GCS (Linux)
        if: ${{ startsWith(matrix.os, 'ubuntu') && env.gcp_existing_archive == '' }}
        shell: bash
        run: |
          # Pulls binaries that mp3 (sui-operations/prebuild-walrus-images.yml) extracted
          # from prebuilt walrus images. amd64 lands at gs://mysten-walrus-binaries/walrus/<sha>/<basename>,
          # arm64 at gs://mysten-walrus-binaries/walrus-arm64/<sha>/<basename> — see mp3's
          # binary_upload_config in sui-operations/pulumi/apps/mp3 (walrus-service[-arm64] and
          # walrus-upload-relay[-arm64] rules). Fails loudly if any binary in
          # binary-build-list.json release_binaries is missing.
          mkdir -p ${{ env.TMP_BUILD_DIR }} ./tmp
          [ ! -f ${{ env.BINARY_LIST_FILE }} ] && echo "${{ env.BINARY_LIST_FILE }} cannot be found" && exit 1

          [ -z "${linux_prebuilt_path}" ] && echo "::error::linux_prebuilt_path is not configured for ${{ matrix.os }}" && exit 1
          gcs_prefix="gs://mysten-walrus-binaries/${linux_prebuilt_path}/${walrus_sha}"

          missing=()
          for binary in $(jq -r '.release_binaries[]' ${{ env.BINARY_LIST_FILE }}); do
            binary=$(echo "${binary}" | tr -d $'\r')
            src="${gcs_prefix}/${binary}"
            dest="${{ env.TMP_BUILD_DIR }}/${binary}"
            echo "Downloading ${src}"
            if ! gcloud storage cp "${src}" "${dest}"; then
              missing+=("${binary}")
              continue
            fi
            chmod +x "${dest}"
          done

          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing prebuilt binaries at ${gcs_prefix}/: ${missing[*]}"
            echo "::error::These must be produced by sui-operations/prebuild-walrus-images.yml + mp3:binary_upload_config before tagging."
            exit 1
          fi

          tar -cvzf ./tmp/walrus-${{ env.walrus_tag }}-${{ env.os_type }}.tgz -C ${{ env.TMP_BUILD_DIR }} .

      - name: Install nexttest (Windows)
        if: ${{ startsWith(matrix.os, 'windows') && env.gcp_existing_archive == '' }}
        uses: taiki-e/install-action@cargo-hack # pin@cargo-hack

      - name: Install postgres (Windows)
        if: ${{ startsWith(matrix.os, 'windows') && env.gcp_existing_archive == '' }}
        shell: bash
        run: |
          choco install postgresql12 --force --params '/Password:root'
          echo "C:\Program Files\PostgreSQL\12\bin" >> $GITHUB_PATH
          echo "C:\Program Files\PostgreSQL\12\lib" >> $GITHUB_PATH
          echo "PQ_LIB_DIR=C:\Program Files\PostgreSQL\12\lib" >> $GITHUB_ENV
          echo "PG_DATABASE_URL=postgres://postgres:root@localhost/" >> $GITHUB_ENV
          echo "PG_EXAMPLE_DATABASE_URL=postgres://postgres:root@localhost/diesel_example" >> $GITHUB_ENV

      - name: Set git config for long paths (Windows)
        if: ${{ startsWith(matrix.os, 'windows') }}
        run: |
          git config --system core.longpaths true

      - name: Install postgres (MacOS arm64)
        if: ${{ matrix.os == 'macos-latest-xlarge' && env.gcp_existing_archive == '' }}
        shell: bash
        env:
          PQ_LIB_DIR: "$(brew --prefix libpq)/lib"
          LIBRARY_PATH: "/opt/homebrew/lib:$LIBRARY_PATH"
          PKG_CONFIG_PATH: "/opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH"
          PATH: "/opt/homebrew/bin:$PATH"
        run: |
          brew install postgresql

      - name: Remove unused apps (MacOS arm64)
        if: ${{ matrix.os == 'macos-latest-xlarge' && env.gcp_existing_archive == '' }}
        continue-on-error: true
        shell: bash
        run: |
          # MacOS arm64 runner only has 14GB avaialble, which is too small for our builds, so removing unused softwared.
          df -h /
          sudo rm -rf /Applications/Xcode*.app
          sudo rm -rf ~/Library/Developer/Xcode/DerivedData
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/*
          sudo rm -rf ~/Library/Developer/Xcode/iOS\ DeviceSupport/*
          df -h /

      - name: Setup sccache
        if: ${{ !startsWith(matrix.os, 'ubuntu') && env.gcp_existing_archive == '' }}
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # pin@v0.0.10

      - name: Cargo build for ${{ matrix.os }} platform
        if: ${{ !startsWith(matrix.os, 'ubuntu') && env.gcp_existing_archive == '' }}
        shell: bash
        run: |
          [ -f ~/.cargo/env ] && source ~/.cargo/env ; cargo build --release

      - name: Rename and archive binaries for ${{ matrix.os }}
        if: ${{ !startsWith(matrix.os, 'ubuntu') && env.gcp_existing_archive == '' }}
        shell: bash
        run: |
          mkdir -p ${{ env.TMP_BUILD_DIR }}

          [ ! -f ${{ env.BINARY_LIST_FILE }} ] && echo "${{ env.BINARY_LIST_FILE }} cannot be found" && exit 1
          for binary in $(cat ${{ env.BINARY_LIST_FILE }} | jq -r '.release_binaries[]'); do
            export binary=$(echo ${binary} | tr -d $'\r')
            mv ./target/release/${binary}${{ env.extention }} ${{ env.TMP_BUILD_DIR }}/${binary}${{ env.extention }}
          done

          tar -cvzf ./tmp/walrus-${{ env.walrus_tag }}-${{ env.os_type }}.tgz -C ${{ env.TMP_BUILD_DIR }} .

      - name: Remove temp staging files
        shell: bash
        run: rm -rf ${{ env.TMP_BUILD_DIR }}

      - name: List upload directory contents
        shell: bash
        run: ls -al ./tmp

      - name: Upload binaries for ${{ inputs.os }} platform to GCP
        uses: google-github-actions/upload-cloud-storage@6397bd7208e18d13ba2619ee21b9873edc94427a # pin@v3.0.0
        with:
          path: "./tmp"
          destination: "mysten-walrus-releases"
          parent: false

      - name: Upload release artifacts for ${{ matrix.os }} platform
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin@7.0.1
        with:
          name: walrus-binaries-${{ matrix.os }}
          if-no-files-found: error
          path: |
            ./tmp/walrus-${{ env.walrus_tag }}-${{ env.os_type }}.tgz

      - name: Attach artifacts to ${{ env.walrus_tag }} release in GH
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # pin@v3.0.1
        with:
          tag_name: ${{ env.walrus_tag }}
          files: |
            ./tmp/walrus-${{ env.walrus_tag }}-${{ env.os_type }}.tgz
