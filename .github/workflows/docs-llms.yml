name: Run LLM Ingestion Checks for Docs

on:
  workflow_run:
    workflows: ["Build and deploy GitHub Pages preview for PRs"]
    types:
      - completed

jobs:
  check-docs:
    # Only run on successful completion of a PR preview build (not a PR close/cleanup)
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Get PR number
        id: find-pr
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            // workflow_run.pull_requests is populated for same-repo PRs
            const prs = context.payload.workflow_run.pull_requests;
            if (prs && prs.length > 0) {
              return String(prs[0].number);
            }
            // Fallback: search by head SHA
            const sha = context.payload.workflow_run.head_sha;
            const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });
            const openPr = result.data.find(pr => pr.state === 'open' && pr.base.ref === 'main');
            return openPr ? String(openPr.number) : '';

      - name: Setup Node
        if: steps.find-pr.outputs.result != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run afdocs check
        if: steps.find-pr.outputs.result != ''
        id: afdocs
        run: |
          OUTPUT=$(npx --yes afdocs@latest check "$URL" --max-links 1000 2>&1) || true
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-preview/pr-${{ steps.find-pr.outputs.result }}/

      - name: Comment on PR
        if: steps.find-pr.outputs.result != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- afdocs-check -->';
            const url = process.env.URL;
            const output = process.env.OUTPUT;
            const prNumber = parseInt(process.env.PR_NUMBER);

            const body = [
              marker,
              '## 📋 afdocs check results',
              `**URL:** ${url}`,
              '```',
              output,
              '```',
            ].join('\n');

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              }
            );
            const existing = comments.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
        env:
          URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-preview/pr-${{ steps.find-pr.outputs.result }}/
          OUTPUT: ${{ steps.afdocs.outputs.result }}
          PR_NUMBER: ${{ steps.find-pr.outputs.result }}
