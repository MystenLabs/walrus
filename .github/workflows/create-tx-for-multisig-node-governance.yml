name: Build TX for Multisig Node Governance Operation

on:
  workflow_dispatch:
    inputs:
      upgrade_manager_object_id:
        # The default value is the Walrus mainnet UpgradeManager object ID.
        description: "UpgradeManager object ID"
        required: false
        default: "0xc42868ad4861f22bd1bcd886ae1858d5c007458f647a49e502d44da8bbd17b51"
        type: string
      node_id:
        description: "Storage node ID (used to derive the Authenticated capability)"
        required: true
        type: string
      multisig_wallet_address:
        # The default value is the Walrus mainnet node-governance multisig wallet address.
        description: "Multisig wallet address (transaction sender; must be the node's governance-authorized address)"
        required: false
        default: "0x14d908379bdcd56d0cdf3686de524ee7715decf30f7691f9a8abb0788db20ffb"
        type: string
      package_digest_base64:
        description: "Base64-encoded package digest of the upgrade target"
        required: true
        type: string
      staking_object_id:
        # The default value is the Walrus mainnet staking object ID.
        description: "Staking object ID"
        required: false
        default: "0x10b9d30c28448939ce6c4d6c6e0ffce4a7f8a4ada8248bdad09ef8b70e4a3904"
        type: string
      gas_object_id:
        description: "Gas object ID owned by the multisig (defaults to highest-balance gas coin)"
        required: false
        type: string
      commit:
        description: "Commit hash of the walrus repo to create the transaction"
        required: true
        type: string

jobs:
  create-tx:
    name: Create vote_for_upgrade TX for multisig
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v7.0.0
        with:
          fetch-depth: 1
          ref: ${{ inputs.commit }}

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH

      - name: Install Sui and grpcurl using Homebrew
        run: brew install sui grpcurl

      - name: Setup sui client config
        run: |
          sui client switch --env mainnet

      - name: Create unsigned transaction for multisig
        run: |
          mkdir -p artifacts
          ./scripts/create_multisig_node_governance_tx.sh \
            -u '${{ inputs.upgrade_manager_object_id }}' \
            -n '${{ inputs.node_id }}' \
            -m '${{ inputs.multisig_wallet_address }}' \
            -d '${{ inputs.package_digest_base64 }}' \
            -s '${{ inputs.staking_object_id }}' \
            -g '${{ inputs.gas_object_id }}' \
            >artifacts/tx-data.txt

      - name: Show Transaction Data (To sign)
        run: |
          cat artifacts/tx-data.txt

      - name: Upload Transaction Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin@v7.0.1
        with:
          name: transaction-data
          path: artifacts/tx-data.txt
