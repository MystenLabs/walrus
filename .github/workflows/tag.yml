name: Tag Walrus Branch

on:
  repository_dispatch:
    types: [tag-walrus-branch]

  workflow_call:
    inputs:
      walrus_commit:
        description: 'Walrus repo commit to tag'
        type: string
        required: true
      tag_name:
        description: 'Tag Name'
        type: string
        required: true
  workflow_dispatch:
    inputs:
      walrus_commit:
        description: 'Walrus repo commit to tag'
        type: string
        required: true
      tag_name:
        description: 'Tag Name'
        type: string
        required: true

env:
  WALRUS_COMMIT: "${{ github.event.client_payload.walrus_commit || inputs.walrus_commit }}"
  TAG_NAME: "${{ github.event.client_payload.tag_name || inputs.tag_name }}"

jobs:
  tag:
    name: Tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin@v7.0.0

      - name: Tag
        uses: julbme/gh-action-manage-tag@8daf6387badea2c6b8f989bd0f82b5a9ef1d84e6 # pin@v1.0.1
        with:
          name: ${{ env.TAG_NAME }}
          state: present
          from: ${{ env.WALRUS_COMMIT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
